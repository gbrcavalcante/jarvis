name: CI / Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -q

  build-windows:
    name: Build Windows .exe
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build with PyInstaller
        run: uv run pyinstaller jarvis.spec

      - name: Build NSIS installer
        uses: joncloud/makensis-action@v4
        with:
          script-file: installer/windows/installer.nsi
          arguments: "/V4"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-windows-installer
          path: JARVIS-*-Setup.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: JARVIS-*-Setup.exe

  build-linux:
    name: Build Linux .AppImage
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 libqt6widgets6

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build with PyInstaller
        run: uv run pyinstaller jarvis.spec

      - name: Build AppImage
        uses: AppImageCrafters/build-appimage-action@v1.3
        with:
          recipe: installer/linux/AppImageBuilder.yml

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-linux-appimage
          path: "*.AppImage"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.AppImage"
